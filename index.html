<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Meu Fluxo" />
    <title>Meu Fluxo Mensal</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Controle financeiro</p>
          <h1>Meu Fluxo Mensal</h1>
        </div>
        <button id="monthButton" class="month-select" type="button" aria-label="Selecionar mes"></button>
      </header>

      <main>
        <section id="view-summary" class="view active"></section>
        <section id="view-revenues" class="view"></section>
        <section id="view-card" class="view"></section>
        <section id="view-year" class="view"></section>
        <section id="view-options" class="view"></section>
      </main>

      <nav class="bottom-nav" aria-label="Navegacao principal">
        <button class="nav-button active" data-view="summary" aria-label="Resumo">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
          </span>
          <span>Resumo</span>
        </button>
        <button class="nav-button" data-view="revenues" aria-label="Receitas">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M17 7.5c-.8-1.1-2.2-1.8-4-1.8-2.3 0-4 1.1-4 2.9 0 4 8 1.8 8 5.9 0 1.8-1.8 3-4.2 3-2 0-3.5-.7-4.8-2"/></svg>
          </span>
          <span>Receitas</span>
        </button>
        <button class="nav-button" data-view="card" aria-label="Cartao">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 7h18v12H3z"/><path d="M3 11h18"/><path d="M7 16h4"/></svg>
          </span>
          <span>Cartao</span>
        </button>
        <button class="nav-button" data-view="year" aria-label="Ano">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M7 15l4-4 3 3 5-7"/></svg>
          </span>
          <span>Ano</span>
        </button>
        <button class="nav-button" data-view="options" aria-label="Opcoes">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><path d="M5.6 5.6l2.1 2.1"/><path d="M16.3 16.3l2.1 2.1"/><path d="M18.4 5.6l-2.1 2.1"/><path d="M7.7 16.3l-2.1 2.1"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span>Opcoes</span>
        </button>
      </nav>
    </div>

    <input id="backupFileInput" type="file" accept="application/json,.json" hidden />

    <dialog id="monthDialog" class="dialog">
      <form id="monthForm" novalidate>
        <div class="dialog-head">
          <h2>Selecionar periodo</h2>
          <button class="icon-button" id="closeMonthDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <label>
          Mes
          <select id="monthPicker"></select>
        </label>
        <label>
          Ano
          <input id="yearPicker" inputmode="numeric" placeholder="2026" />
        </label>
        <button class="primary-button" type="submit">Abrir mes</button>
      </form>
    </dialog>

    <dialog id="expenseDialog" class="dialog">
      <form id="expenseForm" novalidate>
        <div class="dialog-head">
          <h2 id="expenseDialogTitle">Nova despesa</h2>
          <button class="icon-button" id="closeExpenseDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <input id="expenseId" type="hidden" />
        <label>
          Nome
          <input id="expenseName" required autocomplete="off" />
        </label>
        <label>
          Valor
          <input id="expenseAmount" class="money-input" required inputmode="numeric" value="0,00" />
        </label>
        <label>
          Vencimento
          <input id="expenseDueDate" type="date" />
        </label>
        <label>
          Categoria
          <select id="expenseCategory">
            <option>Moradia</option>
            <option>Transporte</option>
            <option>Educacao</option>
            <option>Saude e bem-estar</option>
            <option>Assinaturas/Servicos</option>
            <option>Lazer</option>
            <option>Mercado</option>
            <option>Cartao</option>
            <option>Outros</option>
          </select>
        </label>
        <label>
          Forma de pagamento
          <select id="expensePayment">
            <option value="">Nao informado</option>
            <option>Pix</option>
            <option>Cartao</option>
            <option>Boleto</option>
            <option>Debito</option>
            <option>Dinheiro</option>
          </select>
        </label>
        <div class="parcel-grid">
          <label>
            Parcela atual
            <input id="expenseInstallmentCurrent" inputmode="numeric" placeholder="1" />
          </label>
          <label>
            Total de parcelas
            <input id="expenseInstallmentTotal" inputmode="numeric" placeholder="1" />
          </label>
        </div>
        <label class="check-row">
          <input id="expenseRecurring" type="checkbox" />
          Repetir mensalmente
        </label>
        <label id="expenseRecurringCountLabel" hidden>
          Quantidade de meses
          <input id="expenseRecurringCount" inputmode="numeric" value="12" />
        </label>
        <label class="check-row">
          <input id="expensePaid" type="checkbox" />
          Ja foi quitada
        </label>
        <button class="primary-button" id="saveExpenseButton" type="submit">Salvar despesa</button>
      </form>
    </dialog>

    <dialog id="revenueDialog" class="dialog">
      <form id="revenueForm" novalidate>
        <div class="dialog-head">
          <h2 id="revenueDialogTitle">Nova receita</h2>
          <button class="icon-button" id="closeRevenueDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <input id="revenueId" type="hidden" />
        <label>
          Nome
          <input id="revenueName" required autocomplete="off" />
        </label>
        <label>
          Valor
          <input id="revenueAmount" class="money-input" required inputmode="numeric" value="0,00" />
        </label>
        <label>
          Data prevista
          <input id="revenueDueDate" type="date" />
        </label>
        <label>
          Status
          <select id="revenueStatus">
            <option value="expected">Prevista</option>
            <option value="received">Recebida</option>
          </select>
        </label>
        <label class="check-row">
          <input id="revenueRecurring" type="checkbox" />
          Repetir mensalmente
        </label>
        <label id="revenueRecurringCountLabel" hidden>
          Quantidade de meses
          <input id="revenueRecurringCount" inputmode="numeric" value="12" />
        </label>
        <button class="primary-button" id="saveRevenueButton" type="submit">Salvar receita</button>
      </form>
    </dialog>

    <dialog id="actionDialog" class="action-dialog">
      <div class="action-sheet">
        <h2 id="actionDialogTitle">Lancamento</h2>
        <button class="sheet-button" id="actionEditButton" type="button">Editar</button>
        <button class="sheet-button" id="actionEditSeriesButton" type="button" hidden>Editar toda a serie</button>
        <button class="sheet-button" id="actionCardButton" type="button">Mostrar no cartao</button>
        <button class="sheet-button danger" id="actionDeleteButton" type="button">Deletar</button>
        <button class="sheet-button danger" id="actionDeleteSeriesButton" type="button" hidden>Deletar toda a serie</button>
        <button class="sheet-button muted" id="actionCancelButton" type="button">Cancelar</button>
      </div>
    </dialog>

    <dialog id="budgetDialog" class="dialog">
      <form id="budgetForm" novalidate>
        <div class="dialog-head">
          <h2>Limites por categoria</h2>
          <button class="icon-button" id="closeBudgetDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <div id="budgetFields" class="budget-fields"></div>
        <button class="primary-button" type="submit">Salvar limites</button>
      </form>
    </dialog>

    <dialog id="nubankDialog" class="dialog nubank-dialog">
      <div class="nubank-dialog-content">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Compras parceladas</p>
            <h2 id="nubankDialogTitle">Despesas fixas - Cartao</h2>
          </div>
          <button class="icon-button" id="closeNubankDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <form id="nubankBaseForm" class="nubank-base-form">
          <label>
            Total deste mes
            <input id="nubankMonthTotal" class="money-input nubank-total-input" inputmode="numeric" value="0,00" />
          </label>
          <label>
            Valor ja existente
            <input id="nubankBaseAmount" value="0,00" readonly />
          </label>
          <button class="secondary-button" type="submit">Atualizar total</button>
        </form>
        <div class="section-title-row">
          <div>
            <h3>Parcelas deste mes</h3>
            <p class="small">As compras abaixo aparecem somente nesta janela.</p>
          </div>
          <button class="primary-button nubank-add-button" id="openNubankPurchase" type="button">+ Compra</button>
        </div>
        <div id="nubankInstallmentList" class="list"></div>
      </div>
    </dialog>

    <dialog id="nubankPurchaseDialog" class="dialog">
      <form id="nubankPurchaseForm" novalidate>
        <div class="dialog-head">
          <h2 id="nubankPurchaseDialogTitle">Nova compra parcelada</h2>
          <button class="icon-button" id="closeNubankPurchaseDialog" type="button" aria-label="Fechar">x</button>
        </div>
        <input id="nubankPurchaseId" type="hidden" />
        <label>
          Nome da compra
          <input id="nubankPurchaseName" required autocomplete="off" />
        </label>
        <label>
          Valor de cada parcela
          <input id="nubankPurchaseAmount" class="money-input" required inputmode="numeric" value="0,00" />
        </label>
        <label>
          Parcela deste mes
          <input id="nubankPurchaseCurrent" required inputmode="numeric" value="1" />
        </label>
        <label>
          Total de parcelas
          <input id="nubankPurchaseTotal" required inputmode="numeric" value="1" />
        </label>
        <button class="primary-button" type="submit">Salvar compra</button>
        <button class="secondary-button danger-button" id="deleteNubankPurchase" type="button" hidden>Excluir compra inteira</button>
      </form>
    </dialog>

    <div id="undoToast" class="undo-toast" hidden>
      <span>Lancamento excluido</span>
      <button id="undoDeleteButton" type="button">Desfazer</button>
    </div>

    <script src="data.js?v=12"></script>
    <script src="app.js?v=12" defer></script>
  </body>
</html>
